<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cambia il Clima della Tua Vita | Super Win for Life</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    touch-action:none; -webkit-user-select:none; user-select:none; }

  /* ---- SPLASH ---- */
  #splash {
    position:fixed; inset:0; z-index:100;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition: opacity 0.6s ease;
  }
  #splash.hidden { opacity:0; pointer-events:none; }
  .sp-title {
    font-size:28px; color:#fff; font-weight:800; text-align:center;
    line-height:1.3; margin-bottom:12px; text-transform:uppercase; letter-spacing:2px;
  }
  .sp-sub {
    font-size:15px; color:rgba(255,255,255,0.65); text-align:center;
    margin-bottom:40px; max-width:300px; line-height:1.5;
  }
  .sp-btn {
    background: linear-gradient(135deg, #e94560, #c23152);
    color:#fff; border:none; border-radius:30px;
    padding:16px 48px; font-size:18px; font-weight:700;
    cursor:pointer; text-transform:uppercase; letter-spacing:1px;
    box-shadow:0 4px 20px rgba(233,69,96,0.4);
  }
  .sp-btn:active { transform:scale(0.95); }
  #splash .error-msg {
    margin-top:20px; color:#e94560; font-size:14px; text-align:center;
    max-width:300px; line-height:1.4; display:none;
  }

  /* ---- SCRATCH PHASE ---- */
  #scratch-layer {
    position:fixed; inset:0; z-index:50; display:none;
  }
  #scratch-canvas {
    width:100%; height:100%; display:block;
  }
  #scratch-ui {
    position:fixed; top:0; left:0; width:100%; z-index:55;
    padding:16px 20px; display:flex; align-items:center; gap:12px;
    pointer-events:none;
  }
  .scratch-label {
    background:rgba(255,255,255,0.9); border-radius:20px;
    padding:8px 16px; font-weight:700; font-size:14px; color:#1a1a2e;
    box-shadow:0 2px 12px rgba(0,0,0,0.15); white-space:nowrap;
  }
  .scratch-bar-bg {
    flex:1; height:8px; background:rgba(255,255,255,0.3);
    border-radius:4px; overflow:hidden;
  }
  .scratch-bar-fill {
    height:100%; width:0%; border-radius:4px;
    background: linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00cc00,#0066ff,#8800ff);
    transition: width 0.3s ease;
  }
  #scratch-hint {
    position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    z-index:55; color:#fff; font-size:18px; font-weight:600;
    text-shadow:0 2px 10px rgba(0,0,0,0.7);
    animation: pulse 2s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes pulse { 0%,100%{opacity:.7;transform:translateX(-50%) scale(1);}
    50%{opacity:1;transform:translateX(-50%) scale(1.05);} }

  /* ---- DOM OVERLAY (WebXR) ---- */
  #ar-overlay {
    position:fixed; inset:0; z-index:10;
    display:none; pointer-events:none;
  }
  #ar-overlay.active { display:block; }
  #ar-info {
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.6); color:#fff; padding:12px 24px;
    border-radius:20px; font-size:15px; font-weight:600;
    text-align:center; pointer-events:none;
    transition: opacity 0.5s;
  }

  /* ---- WIN SCREEN ---- */
  #win-screen {
    position:fixed; inset:0; z-index:200;
    background: linear-gradient(135deg, #0f3460, #1a1a2e, #16213e);
    display:none; flex-direction:column; align-items:center; justify-content:center;
  }
  #win-screen.visible { display:flex; }
  .win-emoji { font-size:64px; margin-bottom:16px; }
  .win-title {
    font-size:30px; color:#fff; font-weight:800; text-align:center;
    margin-bottom:8px; text-transform:uppercase;
    background: linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00cc00,#0066ff,#8800ff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .win-brand { font-size:22px; color:#e94560; font-weight:700; margin-bottom:20px; }
  .win-msg {
    font-size:16px; color:rgba(255,255,255,0.8); text-align:center;
    max-width:300px; line-height:1.5; margin-bottom:32px;
  }
  .win-cta {
    background: linear-gradient(135deg, #00c853, #009624);
    color:#fff; border:none; border-radius:30px;
    padding:16px 40px; font-size:18px; font-weight:700;
    cursor:pointer; text-transform:uppercase;
    box-shadow:0 4px 20px rgba(0,200,83,0.4);
  }

  /* Confetti */
  .confetti {
    position:fixed; z-index:210; pointer-events:none;
    animation: cfall linear forwards;
  }
  @keyframes cfall {
    0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
  }
</style>
</head>
<body>

<!-- ===== SPLASH ===== -->
<div id="splash">
  <div class="sp-title">Cambia il Clima<br>della Tua Vita</div>
  <div class="sp-sub">Gratta via le nuvole e scopri gli arcobaleni nascosti intorno a te!</div>
  <button class="sp-btn" id="start-btn">Inizia</button>
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- ===== SCRATCH LAYER ===== -->
<div id="scratch-layer">
  <canvas id="scratch-canvas"></canvas>
  <div id="scratch-ui">
    <div class="scratch-label" id="scratch-pct">0%</div>
    <div class="scratch-bar-bg"><div class="scratch-bar-fill" id="scratch-fill"></div></div>
  </div>
  <div id="scratch-hint">Gratta con il dito!</div>
</div>

<!-- ===== AR DOM OVERLAY ===== -->
<div id="ar-overlay">
  <div id="ar-info">Guardati intorno per trovare gli arcobaleni!</div>
</div>

<!-- ===== WIN ===== -->
<div id="win-screen">
  <div class="win-emoji">🌈</div>
  <div class="win-title">Hai cambiato il clima!</div>
  <div class="win-brand">Super Win for Life</div>
  <div class="win-msg">Entra in ricevitoria e ritira il tuo gadget esclusivo!</div>
  <button class="win-cta" onclick="location.reload()">Gioca ancora</button>
</div>

<script>
// ================================================================
//  PHASE 1 — SCRATCH CARD (pure 2D UI)
// ================================================================

const SCRATCH_THRESHOLD = 0.55; // 55% cleared → done
let scratchDone = false;

function initScratch() {
  const layer = document.getElementById('scratch-layer');
  const canvas = document.getElementById('scratch-canvas');
  const ctx = canvas.getContext('2d');
  layer.style.display = 'block';

  // Size canvas to screen
  const W = window.innerWidth;
  const H = window.innerHeight;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  // Draw cloudy sky
  drawClouds(ctx, W, H);

  // Scratch interaction
  const brushSize = Math.max(W, H) * 0.07;
  let isDown = false;
  let checkCounter = 0;

  function scratch(x, y) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, brushSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    checkCounter++;
    if (checkCounter % 8 === 0) checkProgress(ctx, W, H);
  }

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); isDown = true;
    const t = e.touches[0];
    scratch(t.clientX, t.clientY);
  }, {passive:false});

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!isDown) return;
    const t = e.touches[0];
    scratch(t.clientX, t.clientY);
  }, {passive:false});

  canvas.addEventListener('touchend', () => { isDown = false; });

  // Mouse fallback
  canvas.addEventListener('mousedown', (e) => { isDown = true; scratch(e.clientX, e.clientY); });
  canvas.addEventListener('mousemove', (e) => { if (isDown) scratch(e.clientX, e.clientY); });
  canvas.addEventListener('mouseup', () => { isDown = false; });
}

function drawClouds(ctx, W, H) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#8eafc2');
  grad.addColorStop(0.5, '#a8c4d4');
  grad.addColorStop(1, '#c5d8e2');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Lots of overlapping cloud puffs to cover the whole screen
  ctx.fillStyle = '#ffffff';
  const puffs = [];
  const gridX = Math.ceil(W / 60);
  const gridY = Math.ceil(H / 50);

  for (let gy = -1; gy <= gridY + 1; gy++) {
    for (let gx = -1; gx <= gridX + 1; gx++) {
      const cx = gx * 60 + (gy % 2) * 30 + (Math.random() - 0.5) * 40;
      const cy = gy * 50 + (Math.random() - 0.5) * 30;
      const r = 40 + Math.random() * 35;
      puffs.push({ x: cx, y: cy, r });
    }
  }

  // Draw puffs with slight transparency variation
  puffs.forEach(p => {
    ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Extra dense layer
  for (let i = 0; i < 120; i++) {
    ctx.globalAlpha = 0.5 + Math.random() * 0.5;
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 30 + Math.random() * 50;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;

  // Add text overlay
  ctx.fillStyle = 'rgba(100, 130, 160, 0.25)';
  ctx.font = `bold ${Math.min(W * 0.06, 28)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('☁️ GRATTA VIA LE NUVOLE ☁️', W / 2, H / 2);
}

function checkProgress(ctx, W, H) {
  if (scratchDone) return;

  // Sample pixels to estimate cleared percentage
  const sampleSize = 80;
  let transparent = 0;
  const total = sampleSize * sampleSize;

  const imgData = ctx.getImageData(0, 0,
    W * window.devicePixelRatio,
    H * window.devicePixelRatio
  );
  const data = imgData.data;
  const iW = imgData.width;
  const iH = imgData.height;

  for (let sy = 0; sy < sampleSize; sy++) {
    for (let sx = 0; sx < sampleSize; sx++) {
      const px = Math.floor((sx / sampleSize) * iW);
      const py = Math.floor((sy / sampleSize) * iH);
      const idx = (py * iW + px) * 4;
      if (data[idx + 3] < 128) transparent++;
    }
  }

  const pct = transparent / total;
  const pctInt = Math.min(Math.round(pct * 100), 100);

  document.getElementById('scratch-pct').textContent = pctInt + '%';
  document.getElementById('scratch-fill').style.width = pctInt + '%';

  if (pct >= SCRATCH_THRESHOLD && !scratchDone) {
    scratchDone = true;
    onScratchComplete();
  }
}

function onScratchComplete() {
  document.getElementById('scratch-hint').textContent = '🌈 Nuvole spazzate!';

  // Fade out scratch layer
  const layer = document.getElementById('scratch-layer');
  layer.style.transition = 'opacity 1s ease';
  layer.style.opacity = '0';

  setTimeout(() => {
    layer.style.display = 'none';
    startARPhase();
  }, 1000);
}

// ================================================================
//  PHASE 2 — WebXR immersive-ar
// ================================================================

let xrSession = null;
let xrRefSpace = null;
let renderer = null;
let scene = null;
let camera = null;
let rainbowsPlaced = false;
let gl = null;

async function startARPhase() {
  const overlay = document.getElementById('ar-overlay');
  overlay.classList.add('active');

  try {
    const supported = await navigator.xr.isSessionSupported('immersive-ar');
    if (!supported) {
      showError('WebXR immersive-ar non supportato su questo device/browser.');
      return;
    }

    // Request AR session
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: overlay }
    });

    // Setup Three.js
    initThreeXR();

    // Reference space — local-floor for world-anchored tracking
    xrRefSpace = await xrSession.requestReferenceSpace('local-floor');

    // Bind renderer to XR session
    await gl.makeXRCompatible();
    const baseLayer = new XRWebGLLayer(xrSession, gl);
    xrSession.updateRenderState({ baseLayer });

    // Start render loop
    xrSession.requestAnimationFrame(onXRFrame);

    xrSession.addEventListener('end', () => {
      xrSession = null;
    });

  } catch (e) {
    console.error('AR session error:', e);
    showError('Errore avvio AR: ' + e.message);
  }
}

function initThreeXR() {
  // Create renderer
  const canvas = document.createElement('canvas');
  document.body.appendChild(canvas);
  canvas.style.cssText = 'position:fixed;inset:0;z-index:1;width:100%;height:100%;';

  renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  renderer.xr.enabled = true;
  renderer.xr.setSession(xrSession);

  gl = renderer.getContext();

  // Scene
  scene = new THREE.Scene();

  // Camera (WebXR manages this)
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);

  // Lighting
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(1, 3, 2);
  scene.add(dir);

  // Add point lights for rainbow glow
  const pointLight = new THREE.PointLight(0xffffff, 0.4, 10);
  pointLight.position.set(0, 2, 0);
  scene.add(pointLight);
}

// ================================================================
//  RAINBOW CREATION
// ================================================================

function createRainbowMesh(scale) {
  const group = new THREE.Group();
  const colors = [0xff0000, 0xff8800, 0xffff00, 0x00cc00, 0x0088ff, 0x4400cc, 0x8800ff];
  const baseR = 0.3 * scale;

  colors.forEach((color, i) => {
    const r = baseR + i * (0.025 * scale);

    // Main band
    const geom = new THREE.TorusGeometry(r, 0.012 * scale, 10, 48, Math.PI);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 0.3,
      roughness: 0.4, metalness: 0.05, side: THREE.DoubleSide,
    });
    group.add(new THREE.Mesh(geom, mat));

    // Glow
    const glowGeom = new THREE.TorusGeometry(r, 0.03 * scale, 8, 32, Math.PI);
    const glowMat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.1,
      blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
    });
    group.add(new THREE.Mesh(glowGeom, glowMat));
  });

  return group;
}

function placeRainbows() {
  if (rainbowsPlaced) return;
  rainbowsPlaced = true;

  // Rainbow placements: [angle(rad), distance(m), height(m), scale, tiltZ(rad)]
  const placements = [
    { angle: 0,            dist: 2.0, h: 1.8, scale: 1.0, tilt: 0     },
    { angle: Math.PI*0.4,  dist: 3.0, h: 2.5, scale: 1.3, tilt: 0.1   },
    { angle:-Math.PI*0.35, dist: 2.5, h: 1.2, scale: 0.8, tilt:-0.15  },
    { angle: Math.PI*0.8,  dist: 1.8, h: 3.0, scale: 0.7, tilt: 0.2   },
    { angle:-Math.PI*0.7,  dist: 3.5, h: 0.8, scale: 1.1, tilt: 0     },
    { angle: Math.PI*0.15, dist: 4.0, h: 2.0, scale: 0.6, tilt:-0.1   },
    { angle:-Math.PI*0.9,  dist: 2.2, h: 1.5, scale: 0.9, tilt: 0.05  },
    { angle: Math.PI*0.6,  dist: 1.5, h: 2.8, scale: 0.5, tilt: 0.15  },
  ];

  placements.forEach((p, i) => {
    const rainbow = createRainbowMesh(p.scale);

    // Position in world space around the user
    const x = Math.sin(p.angle) * p.dist;
    const z = -Math.cos(p.angle) * p.dist;
    rainbow.position.set(x, p.h, z);

    // Face roughly toward origin (user)
    rainbow.rotation.y = p.angle + Math.PI;
    rainbow.rotation.z = p.tilt;

    // Animate entrance: scale from 0
    rainbow.scale.set(0.01, 0.01, 0.01);
    rainbow.userData = {
      targetScale: 1,
      spawnDelay: i * 300,
      spawnTime: -1,
      spawned: false,
      floatOffset: Math.random() * Math.PI * 2,
    };

    scene.add(rainbow);

    // Add sparkles near each rainbow
    addSparklesAt(x, p.h, z, p.scale);
  });

  // Update info text
  setTimeout(() => {
    document.getElementById('ar-info').textContent = '8 arcobaleni nascosti! Esplorale!';
  }, 500);

  // Trigger win after some time
  setTimeout(() => {
    document.getElementById('ar-info').style.opacity = '0';
    setTimeout(showWin, 1000);
  }, 15000);
}

function addSparklesAt(x, y, z, scale) {
  const count = 20;
  const positions = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    positions[i*3]   = x + (Math.random()-0.5) * scale * 0.8;
    positions[i*3+1] = y + (Math.random()-0.5) * scale * 0.6;
    positions[i*3+2] = z + (Math.random()-0.5) * scale * 0.5;
  }

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const mat = new THREE.PointsMaterial({
    color: 0xffffcc, size: 0.025,
    transparent: true, opacity: 0.7,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true,
  });

  scene.add(new THREE.Points(geom, mat));
}

// ================================================================
//  XR RENDER LOOP
// ================================================================

const clock = new THREE.Clock();

function onXRFrame(time, frame) {
  xrSession.requestAnimationFrame(onXRFrame);

  const pose = frame.getViewerPose(xrRefSpace);
  if (!pose) return;

  // Place rainbows on first valid pose
  if (!rainbowsPlaced) {
    placeRainbows();
  }

  // Animate rainbows
  const dt = clock.getDelta();
  scene.traverse(obj => {
    if (obj.userData && obj.userData.hasOwnProperty('targetScale')) {
      const ud = obj.userData;

      // Spawn animation with staggered delay
      if (!ud.spawned) {
        if (ud.spawnTime < 0) ud.spawnTime = time;
        if (time - ud.spawnTime > ud.spawnDelay) {
          ud.spawned = true;
        }
      }

      if (ud.spawned) {
        // Scale up with elastic ease
        const curr = obj.scale.x;
        const target = ud.targetScale;
        if (curr < target * 0.99) {
          const newS = curr + (target - curr) * 0.06;
          obj.scale.set(newS, newS, newS);
        }

        // Gentle float
        const floatY = Math.sin(time * 0.001 + ud.floatOffset) * 0.03;
        obj.position.y += floatY * dt;
      }
    }
  });

  // Render
  const glLayer = xrSession.renderState.baseLayer;
  renderer.setSize(glLayer.framebufferWidth, glLayer.framebufferHeight, false);

  for (const view of pose.views) {
    const viewport = glLayer.getViewport(view);
    renderer.setViewport(viewport.x, viewport.y, viewport.width, viewport.height);

    camera.matrix.fromArray(view.transform.matrix);
    camera.projectionMatrix.fromArray(view.projectionMatrix);
    camera.matrixAutoUpdate = false;
    camera.matrixWorldNeedsUpdate = true;

    renderer.render(scene, camera);
  }
}

// ================================================================
//  WIN SCREEN + CONFETTI
// ================================================================

function showWin() {
  launchConfetti();
  setTimeout(() => {
    document.getElementById('win-screen').classList.add('visible');
    if (xrSession) xrSession.end();
  }, 500);
}

function launchConfetti() {
  const colors = ['#ff0000','#ff8800','#ffff00','#00cc00','#0088ff','#8800ff','#ff00ff','#fff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti';
      p.style.left = Math.random()*100 + 'vw';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.width = (6+Math.random()*8) + 'px';
      p.style.height = (6+Math.random()*8) + 'px';
      p.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
      p.style.animationDuration = (2+Math.random()*3) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5500);
    }, i * 30);
  }
}

// ================================================================
//  ERROR DISPLAY
// ================================================================

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('splash').classList.remove('hidden');
}

// ================================================================
//  START FLOW
// ================================================================

document.getElementById('start-btn').addEventListener('click', async () => {
  // Check WebXR support upfront
  if (!navigator.xr) {
    showError('WebXR non disponibile in questo browser. Usa Chrome su Android con ARCore.');
    return;
  }

  let arSupported = false;
  try {
    arSupported = await navigator.xr.isSessionSupported('immersive-ar');
  } catch(e) {}

  if (!arSupported) {
    showError('WebXR immersive-ar non supportato. Serve Chrome su un device Android con ARCore.');
    return;
  }

  // Hide splash, start scratch phase
  document.getElementById('splash').classList.add('hidden');
  setTimeout(initScratch, 600);
});
</script>
</body>
</html>
