<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cambia il Clima della Tua Vita | Super Win for Life</title>

<!-- Three.js (module version for 8th Wall compatibility) -->
<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.172.0/build/three.module.min.js",
    "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/"
} }
</script>
<script type="module">
  import * as THREE from 'three';
  window.THREE = THREE;
  // Also expose individual items 8th Wall expects
  window.THREE.Object3D = THREE.Object3D;
  window.THREE.Scene = THREE.Scene;
  window.THREE.PerspectiveCamera = THREE.PerspectiveCamera;
  window.THREE.WebGLRenderer = THREE.WebGLRenderer;
</script>

<!-- 8th Wall XRExtras (loading, errors, fullscreen canvas) -->
<script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

<!-- 8th Wall Engine Binary (SLAM - free, no API key) -->
<script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
  async crossorigin="anonymous" data-preload-chunks="slam"></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    touch-action:none; -webkit-user-select:none; user-select:none; }

  /* Camera feed canvas */
  #camerafeed {
    position:fixed; inset:0; width:100%; height:100%; z-index:0;
  }

  /* ---- SPLASH ---- */
  #splash {
    position:fixed; inset:0; z-index:100;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition: opacity 0.6s ease;
  }
  #splash.hidden { opacity:0; pointer-events:none; }
  .sp-title {
    font-size:28px; color:#fff; font-weight:800; text-align:center;
    line-height:1.3; margin-bottom:12px; text-transform:uppercase; letter-spacing:2px;
  }
  .sp-sub {
    font-size:15px; color:rgba(255,255,255,0.65); text-align:center;
    margin-bottom:40px; max-width:300px; line-height:1.5;
  }
  .sp-btn {
    background: linear-gradient(135deg, #e94560, #c23152);
    color:#fff; border:none; border-radius:30px;
    padding:16px 48px; font-size:18px; font-weight:700;
    cursor:pointer; text-transform:uppercase; letter-spacing:1px;
    box-shadow:0 4px 20px rgba(233,69,96,0.4);
  }
  .sp-btn:active { transform:scale(0.95); }

  /* ---- SCRATCH PHASE ---- */
  #scratch-layer {
    position:fixed; inset:0; z-index:50; display:none;
  }
  #scratch-canvas { width:100%; height:100%; display:block; }
  #scratch-ui {
    position:fixed; top:0; left:0; width:100%; z-index:55;
    padding:16px 20px; display:flex; align-items:center; gap:12px;
    pointer-events:none;
  }
  .scratch-label {
    background:rgba(255,255,255,0.9); border-radius:20px;
    padding:8px 16px; font-weight:700; font-size:14px; color:#1a1a2e;
    box-shadow:0 2px 12px rgba(0,0,0,0.15); white-space:nowrap;
  }
  .scratch-bar-bg {
    flex:1; height:8px; background:rgba(255,255,255,0.3);
    border-radius:4px; overflow:hidden;
  }
  .scratch-bar-fill {
    height:100%; width:0%; border-radius:4px;
    background: linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00cc00,#0066ff,#8800ff);
    transition: width 0.3s ease;
  }
  #scratch-hint {
    position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    z-index:55; color:#fff; font-size:18px; font-weight:600;
    text-shadow:0 2px 10px rgba(0,0,0,0.7);
    animation: pulse 2s ease-in-out infinite; pointer-events:none;
  }
  @keyframes pulse { 0%,100%{opacity:.7;transform:translateX(-50%) scale(1);}
    50%{opacity:1;transform:translateX(-50%) scale(1.05);} }

  /* ---- AR OVERLAY ---- */
  #ar-overlay {
    position:fixed; inset:0; z-index:10;
    display:none; pointer-events:none;
  }
  #ar-overlay.active { display:block; }
  #ar-info {
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.6); color:#fff; padding:12px 24px;
    border-radius:20px; font-size:15px; font-weight:600;
    text-align:center; pointer-events:none; transition: opacity 0.5s;
  }
  #ar-counter {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.9); color:#1a1a2e; padding:8px 20px;
    border-radius:20px; font-size:16px; font-weight:700;
    pointer-events:none; display:none;
  }

  /* ---- WIN SCREEN ---- */
  #win-screen {
    position:fixed; inset:0; z-index:200;
    background: linear-gradient(135deg, #0f3460, #1a1a2e, #16213e);
    display:none; flex-direction:column; align-items:center; justify-content:center;
  }
  #win-screen.visible { display:flex; }
  .win-emoji { font-size:64px; margin-bottom:16px; }
  .win-title {
    font-size:30px; color:#fff; font-weight:800; text-align:center;
    margin-bottom:8px; text-transform:uppercase;
    background: linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00cc00,#0066ff,#8800ff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .win-brand { font-size:22px; color:#e94560; font-weight:700; margin-bottom:20px; }
  .win-msg {
    font-size:16px; color:rgba(255,255,255,0.8); text-align:center;
    max-width:300px; line-height:1.5; margin-bottom:32px;
  }
  .win-cta {
    background: linear-gradient(135deg, #00c853, #009624);
    color:#fff; border:none; border-radius:30px;
    padding:16px 40px; font-size:18px; font-weight:700;
    cursor:pointer; text-transform:uppercase;
    box-shadow:0 4px 20px rgba(0,200,83,0.4);
  }

  /* Confetti */
  .confetti {
    position:fixed; z-index:210; pointer-events:none;
    animation: cfall linear forwards;
  }
  @keyframes cfall {
    0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
  }
</style>
</head>
<body>

<!-- 8th Wall camera canvas -->
<canvas id="camerafeed"></canvas>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-title">Cambia il Clima<br>della Tua Vita</div>
  <div class="sp-sub">Gratta via le nuvole e scopri gli arcobaleni nascosti intorno a te!</div>
  <button class="sp-btn" id="start-btn">Inizia</button>
</div>

<!-- SCRATCH LAYER -->
<div id="scratch-layer">
  <canvas id="scratch-canvas"></canvas>
  <div id="scratch-ui">
    <div class="scratch-label" id="scratch-pct">0%</div>
    <div class="scratch-bar-bg"><div class="scratch-bar-fill" id="scratch-fill"></div></div>
  </div>
  <div id="scratch-hint">Gratta con il dito!</div>
</div>

<!-- AR OVERLAY -->
<div id="ar-overlay">
  <div id="ar-counter"></div>
  <div id="ar-info">Guardati intorno per trovare gli arcobaleni!</div>
</div>

<!-- WIN SCREEN -->
<div id="win-screen">
  <div class="win-emoji">🌈</div>
  <div class="win-title">Hai cambiato il clima!</div>
  <div class="win-brand">Super Win for Life</div>
  <div class="win-msg">Entra in ricevitoria e ritira il tuo gadget esclusivo!</div>
  <button class="win-cta" onclick="location.reload()">Gioca ancora</button>
</div>

<script>
// ================================================================
//  PHASE 1 — SCRATCH CARD (pure 2D UI)
// ================================================================
const SCRATCH_THRESHOLD = 0.55;
let scratchDone = false;

function initScratch() {
  const layer = document.getElementById('scratch-layer');
  const canvas = document.getElementById('scratch-canvas');
  const ctx = canvas.getContext('2d');
  layer.style.display = 'block';

  const W = window.innerWidth;
  const H = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  drawCloudCover(ctx, W, H);

  const brushSize = Math.max(W, H) * 0.07;
  let isDown = false;
  let checkCounter = 0;

  function scratch(x, y) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, brushSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    checkCounter++;
    if (checkCounter % 8 === 0) checkProgress(ctx, W, H);
  }

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); isDown = true;
    scratch(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (isDown) scratch(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
  canvas.addEventListener('touchend', () => { isDown = false; });
  canvas.addEventListener('mousedown', (e) => { isDown = true; scratch(e.clientX, e.clientY); });
  canvas.addEventListener('mousemove', (e) => { if (isDown) scratch(e.clientX, e.clientY); });
  canvas.addEventListener('mouseup', () => { isDown = false; });
}

function drawCloudCover(ctx, W, H) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#7a9eb5');
  grad.addColorStop(0.4, '#9cb8ca');
  grad.addColorStop(1, '#bdd0da');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Dense cloud puffs - grid + random
  ctx.fillStyle = '#ffffff';
  const gridX = Math.ceil(W / 50);
  const gridY = Math.ceil(H / 45);
  for (let gy = -2; gy <= gridY + 2; gy++) {
    for (let gx = -2; gx <= gridX + 2; gx++) {
      const cx = gx * 50 + (gy % 2) * 25 + (Math.random() - 0.5) * 35;
      const cy = gy * 45 + (Math.random() - 0.5) * 25;
      ctx.globalAlpha = 0.6 + Math.random() * 0.4;
      ctx.beginPath();
      ctx.arc(cx, cy, 35 + Math.random() * 30, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // Extra dense top layer
  for (let i = 0; i < 150; i++) {
    ctx.globalAlpha = 0.4 + Math.random() * 0.6;
    ctx.beginPath();
    ctx.arc(Math.random() * W, Math.random() * H, 25 + Math.random() * 45, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function checkProgress(ctx, W, H) {
  if (scratchDone) return;
  const dpr = window.devicePixelRatio || 1;
  const imgData = ctx.getImageData(0, 0, W * dpr, H * dpr);
  const data = imgData.data;
  const step = 80;
  let transparent = 0, total = 0;
  const iW = imgData.width, iH = imgData.height;

  for (let sy = 0; sy < step; sy++) {
    for (let sx = 0; sx < step; sx++) {
      const px = Math.floor((sx / step) * iW);
      const py = Math.floor((sy / step) * iH);
      const idx = (py * iW + px) * 4;
      if (data[idx + 3] < 128) transparent++;
      total++;
    }
  }

  const pct = transparent / total;
  const pctInt = Math.min(Math.round(pct * 100), 100);
  document.getElementById('scratch-pct').textContent = pctInt + '%';
  document.getElementById('scratch-fill').style.width = pctInt + '%';

  if (pct >= SCRATCH_THRESHOLD) {
    scratchDone = true;
    onScratchComplete();
  }
}

function onScratchComplete() {
  document.getElementById('scratch-hint').textContent = '🌈 Nuvole spazzate!';
  if (navigator.vibrate) navigator.vibrate(150);

  const layer = document.getElementById('scratch-layer');
  layer.style.transition = 'opacity 1s ease';
  layer.style.opacity = '0';
  setTimeout(() => {
    layer.style.display = 'none';
    startAR();
  }, 1000);
}

// ================================================================
//  PHASE 2 — 8th Wall SLAM AR
// ================================================================

let arScene, arCamera, arRenderer;
let rainbows = [];
let rainbowsFound = 0;
const TOTAL_RAINBOWS = 8;
let arStartTime = 0;

// Custom pipeline module for our game
function gamePipelineModule() {
  return {
    name: 'swfl-game',

    onStart: () => {
      const {scene, camera, renderer} = XR8.Threejs.xrScene();
      arScene = scene;
      arCamera = camera;
      arRenderer = renderer;

      // Lighting
      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(2, 5, 3);
      scene.add(dir);

      // Place rainbows around the user in world space
      placeRainbows(scene);

      // Show AR overlay
      document.getElementById('ar-overlay').classList.add('active');
      document.getElementById('ar-counter').style.display = 'block';
      updateCounter();

      arStartTime = performance.now();

      // Tap to "collect" a rainbow
      document.getElementById('camerafeed').addEventListener('touchstart', onARTap);
    },

    onUpdate: ({processCpuResult}) => {
      // Animate rainbows
      const time = performance.now();
      rainbows.forEach(rb => {
        if (!rb.visible || rb.userData.collected) return;
        // Gentle float
        const ud = rb.userData;
        rb.position.y = ud.baseY + Math.sin(time * 0.001 + ud.floatOffset) * 0.04;
        // Slow rotation
        rb.rotation.y += 0.003;
      });
    },

    onRender: () => {
      arRenderer.render(arScene, arCamera);
    },
  };
}

function placeRainbows(scene) {
  // 8 rainbows scattered around the user at various angles, distances, heights
  const placements = [
    { angle: 0,                dist: 2.5, h: 1.2, scale: 0.8  },
    { angle: Math.PI * 0.3,    dist: 3.5, h: 2.0, scale: 1.0  },
    { angle: -Math.PI * 0.35,  dist: 2.0, h: 0.6, scale: 0.6  },
    { angle: Math.PI * 0.65,   dist: 4.0, h: 2.8, scale: 1.2  },
    { angle: -Math.PI * 0.6,   dist: 3.0, h: 1.6, scale: 0.9  },
    { angle: Math.PI * 0.9,    dist: 2.2, h: 3.2, scale: 0.7  },
    { angle: -Math.PI * 0.85,  dist: 3.8, h: 0.9, scale: 1.1  },
    { angle: Math.PI * 0.15,   dist: 1.8, h: 2.4, scale: 0.5  },
  ];

  placements.forEach((p, i) => {
    const rainbow = createRainbowMesh(p.scale);
    const x = Math.sin(p.angle) * p.dist;
    const z = -Math.cos(p.angle) * p.dist;
    rainbow.position.set(x, p.h, z);
    rainbow.rotation.y = p.angle + Math.PI; // face user

    rainbow.userData = {
      index: i,
      collected: false,
      baseY: p.h,
      floatOffset: Math.random() * Math.PI * 2,
    };

    // Spawn animation
    rainbow.scale.set(0.01, 0.01, 0.01);
    animateSpawn(rainbow, i * 400);

    // Add sparkles
    const sparkles = createSparkles(p.scale);
    sparkles.position.copy(rainbow.position);
    scene.add(sparkles);

    scene.add(rainbow);
    rainbows.push(rainbow);
  });
}

function createRainbowMesh(scale) {
  const group = new THREE.Group();
  const colors = [0xff0000, 0xff8800, 0xffff00, 0x00cc00, 0x0088ff, 0x4400cc, 0x8800ff];
  const baseR = 0.25 * scale;

  colors.forEach((color, i) => {
    const r = baseR + i * (0.022 * scale);

    // Main band
    const geom = new THREE.TorusGeometry(r, 0.01 * scale, 10, 48, Math.PI);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 0.35,
      roughness: 0.35, metalness: 0.05, side: THREE.DoubleSide,
    });
    group.add(new THREE.Mesh(geom, mat));

    // Glow
    const glowGeom = new THREE.TorusGeometry(r, 0.025 * scale, 8, 32, Math.PI);
    const glowMat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.12,
      blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
    });
    group.add(new THREE.Mesh(glowGeom, glowMat));
  });

  return group;
}

function createSparkles(scale) {
  const count = 15;
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    positions[i*3]   = (Math.random()-0.5) * scale * 0.6;
    positions[i*3+1] = (Math.random()-0.5) * scale * 0.4;
    positions[i*3+2] = (Math.random()-0.5) * scale * 0.4;
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  return new THREE.Points(geom, new THREE.PointsMaterial({
    color: 0xffffcc, size: 0.02, transparent: true, opacity: 0.6,
    blending: THREE.AdditiveBlending, sizeAttenuation: true,
  }));
}

function animateSpawn(obj, delay) {
  setTimeout(() => {
    const start = performance.now();
    function step() {
      const t = Math.min((performance.now() - start) / 800, 1);
      // Elastic ease out
      const c4 = (2 * Math.PI) / 3;
      const ease = t === 0 ? 0 : t === 1 ? 1 :
        Math.pow(2, -10*t) * Math.sin((t*10 - 0.75)*c4) + 1;
      obj.scale.set(ease, ease, ease);
      if (t < 1) requestAnimationFrame(step);
    }
    step();
  }, delay);
}

// ================================================================
//  TAP TO COLLECT RAINBOW
// ================================================================
function onARTap(e) {
  if (rainbowsFound >= TOTAL_RAINBOWS) return;
  const touch = e.touches[0];
  const rect = e.target.getBoundingClientRect();
  const x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
  const y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;

  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(x, y), arCamera);

  // Check intersection with each rainbow group's children
  for (const rb of rainbows) {
    if (rb.userData.collected) continue;
    const meshes = [];
    rb.traverse(c => { if (c.isMesh) meshes.push(c); });
    const hits = raycaster.intersectObjects(meshes, false);
    if (hits.length > 0 && hits[0].distance < 8) {
      collectRainbow(rb);
      break;
    }
  }
}

function collectRainbow(rb) {
  rb.userData.collected = true;
  rainbowsFound++;
  if (navigator.vibrate) navigator.vibrate(50);
  updateCounter();

  // Collect animation: scale up + fade
  const start = performance.now();
  function anim() {
    const t = Math.min((performance.now() - start) / 600, 1);
    const s = 1 + t * 0.5;
    rb.scale.set(s, s, s);
    rb.traverse(c => {
      if (c.material && c.material.opacity !== undefined) {
        c.material.transparent = true;
        c.material.opacity = Math.max(0, 1 - t);
      }
    });
    if (t < 1) requestAnimationFrame(anim);
    else {
      rb.visible = false;
      if (rainbowsFound >= TOTAL_RAINBOWS) onAllCollected();
    }
  }
  anim();
}

function updateCounter() {
  document.getElementById('ar-counter').textContent =
    `🌈 ${rainbowsFound} / ${TOTAL_RAINBOWS}`;
}

function onAllCollected() {
  document.getElementById('ar-info').textContent = '🎉 Li hai trovati tutti!';
  setTimeout(showWin, 2000);
}

// ================================================================
//  WIN SCREEN + CONFETTI
// ================================================================
function showWin() {
  launchConfetti();
  setTimeout(() => {
    document.getElementById('win-screen').classList.add('visible');
  }, 500);
}

function launchConfetti() {
  const colors = ['#ff0000','#ff8800','#ffff00','#00cc00','#0088ff','#8800ff','#ff00ff','#fff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti';
      p.style.left = Math.random()*100 + 'vw';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.width = (6+Math.random()*8)+'px';
      p.style.height = (6+Math.random()*8)+'px';
      p.style.borderRadius = Math.random()>0.5?'50%':'2px';
      p.style.animationDuration = (2+Math.random()*3)+'s';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5500);
    }, i * 30);
  }
}

// ================================================================
//  START AR (8th Wall engine)
// ================================================================
function startAR() {
  const onxrloaded = () => {
    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),     // Camera feed rendering
      XR8.Threejs.pipelineModule(),                // Three.js integration
      XR8.XrController.pipelineModule(),           // SLAM world tracking
      XRExtras.FullWindowCanvas.pipelineModule(),  // Full-screen canvas
      XRExtras.Loading.pipelineModule(),           // Loading screen + iOS permissions
      XRExtras.RuntimeError.pipelineModule(),      // Error handling
      gamePipelineModule(),                        // Our game logic
    ]);

    XR8.run({canvas: document.getElementById('camerafeed')});
  };

  if (window.XR8) {
    onxrloaded();
  } else {
    window.addEventListener('xrloaded', onxrloaded);
  }
}

// ================================================================
//  SPLASH → SCRATCH → AR
// ================================================================
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('splash').classList.add('hidden');
  setTimeout(initScratch, 600);
});
</script>
</body>
</html>
