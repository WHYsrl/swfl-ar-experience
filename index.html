<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000;

  @keyframes pulse { 0%,100%{opacity:.7;transform:translateX(-50%) scale(1);}

<canvas id="camerafeed"></canvas>

<!-- SCRATCH (shown on top of camera feed) -->

<script>
// ================================================================
//  CONFIG
// ================================================================
const SCRATCH_THRESHOLD = 0.50;
const TOTAL_RAINBOWS    = 8;

// ================================================================
//  STATE
// ================================================================
let scratchDone    = false;
let arScene, arCamera, arRenderer;
let rainbows       = [];
let rainbowsFound  = 0;
let themeElements   = [];

// ================================================================
//  SCRATCH CARD (2D overlay on top of live camera)
// ================================================================
function initScratch() {
  const layer  = document.getElementById('scratch-layer');
  const canvas = document.getElementById('scratch-canvas');
  const ctx    = canvas.getContext('2d');
  layer.style.display = 'block';

  const W = window.innerWidth, H = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  drawCloudCover(ctx, W, H);

  const brushSize = Math.max(W, H) * 0.065;
  let isDown = false, checkN = 0;

  function scratch(x, y) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    // Soft brush with radial gradient
    const grad = ctx.createRadialGradient(x, y, brushSize*0.2, x, y, brushSize);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, brushSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    if (++checkN % 6 === 0) checkProgress(ctx, W, H);
  }

  canvas.addEventListener('touchstart', (e)=>{
    e.preventDefault(); isDown=true;
    scratch(e.touches[0].clientX, e.touches[0].clientY);
  },{passive:false});
  canvas.addEventListener('touchmove', (e)=>{
    e.preventDefault(); if(!isDown) return;
    scratch(e.touches[0].clientX, e.touches[0].clientY);
  },{passive:false});
  canvas.addEventListener('touchend',()=>{isDown=false;});
  canvas.addEventListener('mousedown',(e)=>{isDown=true;scratch(e.clientX,e.clientY);});
  canvas.addEventListener('mousemove',(e)=>{if(isDown)scratch(e.clientX,e.clientY);});
  canvas.addEventListener('mouseup',()=>{isDown=false;});
}

function drawCloudCover(ctx, W, H) {
  // Transparent base — camera is visible where there are no clouds
  ctx.clearRect(0, 0, W, H);

  // Helper: draw one cartoon cloud (cluster of overlapping circles)
  function drawCloud(cx, cy, size, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;

    // Shadow layer
    ctx.fillStyle = 'rgba(180,195,210,0.4)';
    const sh = size * 0.08;
    const puffs = [
      {dx:0, dy:0, r:size*0.5},
      {dx:-size*0.35, dy:size*0.05, r:size*0.38},
      {dx:size*0.38, dy:size*0.03, r:size*0.4},
      {dx:-size*0.18, dy:-size*0.22, r:size*0.32},
      {dx:size*0.15, dy:-size*0.25, r:size*0.35},
      {dx:-size*0.5, dy:size*0.15, r:size*0.28},
      {dx:size*0.52, dy:size*0.12, r:size*0.3},
      {dx:0, dy:-size*0.35, r:size*0.28},
    ];

    puffs.forEach(p => {
      ctx.beginPath();
      ctx.arc(cx + p.dx, cy + p.dy + sh, p.r, 0, Math.PI*2);
      ctx.fill();
    });

    // Main white cloud
    // Outer glow
    const grad = ctx.createRadialGradient(cx, cy, size*0.1, cx, cy, size*0.75);
    grad.addColorStop(0, 'rgba(255,255,255,0.95)');
    grad.addColorStop(1, 'rgba(240,245,250,0.7)');
    ctx.fillStyle = grad;

    puffs.forEach(p => {
      ctx.beginPath();
      ctx.arc(cx + p.dx, cy + p.dy, p.r, 0, Math.PI*2);
      ctx.fill();
    });

    // Bright highlight on top puffs
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    puffs.slice(3, 6).forEach(p => {
      ctx.beginPath();
      ctx.arc(cx + p.dx, cy + p.dy - p.r*0.2, p.r*0.6, 0, Math.PI*2);
      ctx.fill();
    });

    ctx.restore();
  }

  // Place clouds in a pattern that covers the entire screen
  // Large clouds as base layer
  const cloudGrid = [];
  const spacingX = W * 0.22;
  const spacingY = H * 0.18;
  const cols = Math.ceil(W / spacingX) + 2;
  const rows = Math.ceil(H / spacingY) + 2;

  for (let r = -1; r <= rows; r++) {
    for (let c = -1; c <= cols; c++) {
      const cx = c * spacingX + (r % 2) * spacingX * 0.5 + (Math.random()-0.5) * spacingX * 0.3;
      const cy = r * spacingY + (Math.random()-0.5) * spacingY * 0.25;
      const size = spacingX * (0.6 + Math.random() * 0.5);
      cloudGrid.push({cx, cy, size});
    }
  }

  // Draw back-to-front: larger clouds first, smaller on top
  cloudGrid.sort((a,b) => b.size - a.size);
  cloudGrid.forEach(c => drawCloud(c.cx, c.cy, c.size, 0.85 + Math.random()*0.15));

  // Extra small accent clouds for gaps
  for (let i = 0; i < 20; i++) {
    drawCloud(
      Math.random() * W,
      Math.random() * H,
      40 + Math.random() * 60,
      0.7 + Math.random() * 0.3
    );
  }

  // Branding text with shadow
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = `bold ${Math.min(W*0.055,24)}px sans-serif`;
  ctx.fillText('CAMBIA IL CLIMA DELLA TUA VITA', W/2, H/2 - 18);
  ctx.font = `bold ${Math.min(W*0.04,17)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('SUPER WIN FOR LIFE', W/2, H/2 + 18);
  ctx.restore();
}

function checkProgress(ctx, W, H) {
  if (scratchDone) return;
  const dpr = window.devicePixelRatio||1;
  const imgData = ctx.getImageData(0,0,W*dpr,H*dpr);
  const data = imgData.data;
  const step=80; let transparent=0;
  const iW=imgData.width, iH=imgData.height;

  for (let sy=0;sy<step;sy++){
    for(let sx=0;sx<step;sx++){
      const px=Math.floor((sx/step)*iW);
      const py=Math.floor((sy/step)*iH);
      if (data[(py*iW+px)*4+3]<100) transparent++;
    }
  }
  const pct = transparent/(step*step);
  const pctInt = Math.min(Math.round(pct*100),100);
  document.getElementById('scratch-pct').textContent = pctInt+'%';
  document.getElementById('scratch-fill').style.width = pctInt+'%';

  if (pct >= SCRATCH_THRESHOLD) {
    scratchDone = true;
    onScratchComplete();
  }
}

function onScratchComplete() {
  document.getElementById('scratch-hint').textContent = '🌈 Nuvole spazzate!';
  if (navigator.vibrate) navigator.vibrate(150);

  const layer = document.getElementById('scratch-layer');
  layer.style.transition='opacity 0.8s ease';
  layer.style.opacity='0';
  setTimeout(()=>{
    layer.style.display='none';
    showARPhase();
  }, 800);
}

// ================================================================
//  AR PHASE UI (called after scratch done)
// ================================================================
function showARPhase() {
  document.getElementById('ar-overlay').classList.add('active');
  document.getElementById('ar-counter').style.display = 'block';
  updateCounter();

  // Trigger rainbow placement now
  if (arScene) placeRainbows(arScene);
}

// ================================================================
//  8TH WALL PIPELINE — starts immediately on page load
// ================================================================

function gamePipelineModule() {
  return {
    name: 'swfl-game',

    onStart: () => {
      const {scene, camera, renderer} = XR8.Threejs.xrScene();
      arScene = scene;
      arCamera = camera;
      arRenderer = renderer;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      // ---- LIGHTING ----
      scene.add(new THREE.AmbientLight(0xffffff, 0.65));
      const sun = new THREE.DirectionalLight(0xffffff, 0.9);
      sun.position.set(3, 8, 4);
      sun.castShadow = true;
      sun.shadow.mapSize.set(1024, 1024);
      sun.shadow.camera.near = 0.1;
      sun.shadow.camera.far = 30;
      sun.shadow.camera.left = -10;
      sun.shadow.camera.right = 10;
      sun.shadow.camera.top = 10;
      sun.shadow.camera.bottom = -10;
      scene.add(sun);

      // Warm fill light
      const fill = new THREE.DirectionalLight(0xffe0c0, 0.3);
      fill.position.set(-2, 3, -3);
      scene.add(fill);

      // ---- GROUND OCCLUDER ----
      // Invisible mesh that writes to depth buffer only → hides 3D objects behind real floor
      const occluderGeo = new THREE.PlaneGeometry(50, 50);
      const occluderMat = new THREE.MeshStandardMaterial({
        colorWrite: false,       // don't render color
        // but still writes to depth buffer by default
      });
      const occluder = new THREE.Mesh(occluderGeo, occluderMat);
      occluder.rotation.x = -Math.PI / 2;
      occluder.position.y = 0;
      occluder.renderOrder = -1; // render before other objects
      scene.add(occluder);

      // Shadow-receiving ground
      const shadowGeo = new THREE.PlaneGeometry(50, 50);
      const shadowMat = new THREE.ShadowMaterial({ opacity: 0.2 });
      const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
      shadowPlane.rotation.x = -Math.PI / 2;
      shadowPlane.position.y = 0.001;
      shadowPlane.receiveShadow = true;
      scene.add(shadowPlane);

      // ---- START SCRATCH immediately (camera is live behind it) ----
      initScratch();

      // Tap handler for collecting rainbows
      document.getElementById('camerafeed').addEventListener('touchstart', onARTap);
    },

    onUpdate: () => {
      const time = performance.now();

      // Animate rainbows
      rainbows.forEach(rb => {
        if (!rb.visible || rb.userData.collected) return;
        const ud = rb.userData;
        rb.position.y = ud.baseY + Math.sin(time*0.0008 + ud.floatOffset) * 0.05;
        rb.rotation.y += 0.002;
      });

      // Animate theme elements
      const dt = 1/60; // approximate frame delta
      themeElements.forEach(el => {
        if (!el.visible) return;
        const ud = el.userData;
        if (ud.type === 'ar-confetti') {
          // Falling + tumbling + swaying
          el.position.y += ud.velY * dt;
          el.rotation.x += ud.rotSpeed * dt;
          el.rotation.z += ud.rotSpeed * 0.7 * dt;
          el.position.x += Math.sin(time*0.003 + ud.swayPhase) * ud.swayAmp * dt;
          // Remove if below ground
          if (el.position.y < -0.5) el.visible = false;
        } else if (ud.type === 'coin') {
          el.rotation.y += 0.03;
          el.position.y = ud.baseY + Math.sin(time*0.001 + ud.phase) * 0.03;
        } else if (ud.type === 'clover') {
          el.rotation.y += 0.005;
          el.position.y = ud.baseY + Math.sin(time*0.0006 + ud.phase) * 0.02;
        } else if (ud.type === 'star') {
          el.rotation.z += 0.01;
          el.rotation.y += 0.008;
          const s = ud.baseScale * (1 + Math.sin(time*0.002 + ud.phase)*0.15);
          el.scale.set(s,s,s);
        }
      });
    },

    onRender: () => {
      arRenderer.render(arScene, arCamera);
    },
  };
}

// ================================================================
//  PLACE RAINBOWS + THEMED ELEMENTS
// ================================================================
function placeRainbows(scene) {
  if (rainbows.length > 0) return; // already placed

  const placements = [
    { angle: 0,                dist:2.5, h:1.3, scale:2.0  },
    { angle: Math.PI*0.3,      dist:3.5, h:2.2, scale:2.8  },
    { angle:-Math.PI*0.35,     dist:2.0, h:0.7, scale:1.5  },
    { angle: Math.PI*0.65,     dist:4.0, h:2.8, scale:3.2  },
    { angle:-Math.PI*0.6,      dist:3.0, h:1.6, scale:2.2  },
    { angle: Math.PI*0.9,      dist:2.2, h:3.0, scale:1.8  },
    { angle:-Math.PI*0.85,     dist:3.8, h:1.0, scale:2.6  },
    { angle: Math.PI*0.15,     dist:1.8, h:2.5, scale:1.4  },
  ];

  placements.forEach((p, i) => {
    const rainbow = createRainbow(p.scale);
    const x = Math.sin(p.angle) * p.dist;
    const z = -Math.cos(p.angle) * p.dist;
    rainbow.position.set(x, p.h, z);
    rainbow.rotation.y = p.angle + Math.PI;

    rainbow.userData = {
      index: i, collected: false,
      baseY: p.h, floatOffset: Math.random()*Math.PI*2,
    };

    rainbow.scale.set(0.01,0.01,0.01);
    animateSpawn(rainbow, i*350);
    scene.add(rainbow);
    rainbows.push(rainbow);

    // Sparkles near rainbow
    scene.add(createSparkles(x, p.h, z, p.scale));

    // Pot of gold at base of some rainbows — varied sizes
    if (i % 3 === 0) {
      const pot = createPotOfGold();
      const potScale = 2.5 + Math.random() * 2; // 2.5x to 4.5x
      pot.position.set(x, 0.01, z);
      pot.scale.set(potScale, potScale, potScale);
      pot.userData = {type:'pot', baseY:0.01, phase:i};
      scene.add(pot);
    }
  });

  // ---- THEMED ELEMENTS scattered in scene ----

  // Gold coins — varied sizes (2x-5x base)
  for (let i = 0; i < 12; i++) {
    const coin = createCoin();
    const angle = Math.random() * Math.PI * 2;
    const dist  = 1.5 + Math.random() * 3;
    const h     = 0.5 + Math.random() * 2.5;
    const s     = 2 + Math.random() * 3; // scale 2x to 5x
    coin.position.set(Math.sin(angle)*dist, h, -Math.cos(angle)*dist);
    coin.scale.set(s, s, s);
    coin.userData = { type:'coin', baseY:h, phase:Math.random()*Math.PI*2 };
    scene.add(coin);
    themeElements.push(coin);
  }

  // Four-leaf clovers — varied sizes (2.5x-6x base)
  for (let i = 0; i < 6; i++) {
    const clover = createClover();
    const angle = Math.random() * Math.PI * 2;
    const dist  = 2 + Math.random() * 2.5;
    const h     = 0.3 + Math.random() * 1.8;
    const s     = 2.5 + Math.random() * 3.5; // scale 2.5x to 6x
    clover.position.set(Math.sin(angle)*dist, h, -Math.cos(angle)*dist);
    clover.scale.set(s, s, s);
    clover.userData = { type:'clover', baseY:h, phase:Math.random()*Math.PI*2 };
    scene.add(clover);
    themeElements.push(clover);
  }

  // Stars — varied sizes (2x-4x previous range)
  for (let i = 0; i < 15; i++) {
    const star = createStar();
    const angle = Math.random() * Math.PI * 2;
    const dist  = 1 + Math.random() * 4;
    const h     = 1 + Math.random() * 3;
    const s     = 0.08 + Math.random() * 0.14; // 2-4x larger than before
    star.position.set(Math.sin(angle)*dist, h, -Math.cos(angle)*dist);
    star.scale.set(s,s,s);
    star.userData = { type:'star', baseScale:s, phase:Math.random()*Math.PI*2 };
    scene.add(star);
    themeElements.push(star);
  }

  // Floating lottery tickets — varied sizes (2x-4x)
  for (let i = 0; i < 4; i++) {
    const ticket = createTicket();
    const angle = (i/4) * Math.PI * 2 + 0.3;
    const dist  = 2.5 + Math.random();
    const s     = 2 + Math.random() * 2; // scale 2x to 4x
    ticket.position.set(Math.sin(angle)*dist, 1.5+Math.random(), -Math.cos(angle)*dist);
    ticket.rotation.y = angle + Math.PI;
    ticket.rotation.x = -0.2 + Math.random()*0.4;
    ticket.scale.set(s, s, s);
    ticket.userData = { type:'coin', baseY:ticket.position.y, phase:Math.random()*Math.PI*2 };
    scene.add(ticket);
    themeElements.push(ticket);
  }
}

// ================================================================
//  3D ASSET BUILDERS
// ================================================================

function createRainbow(scale) {
  const group = new THREE.Group();
  const colors = [0xff0000,0xff8800,0xffff00,0x00cc00,0x0088ff,0x4400cc,0x8800ff];
  const baseR = 0.25 * scale;

  colors.forEach((color, i) => {
    const r = baseR + i * 0.022 * scale;
    const geom = new THREE.TorusGeometry(r, 0.012*scale, 10, 48, Math.PI);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive:color, emissiveIntensity:0.3,
      roughness:0.35, metalness:0.05, side:THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.castShadow = true;
    group.add(mesh);

    // Glow
    const gGeo = new THREE.TorusGeometry(r, 0.028*scale, 8, 32, Math.PI);
    group.add(new THREE.Mesh(gGeo, new THREE.MeshBasicMaterial({
      color, transparent:true, opacity:0.1,
      blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
    })));
  });

  return group;
}

function createSparkles(x, y, z, scale) {
  const n = 25;
  const pos = new Float32Array(n*3);
  for (let i=0;i<n;i++) {
    pos[i*3]   = x + (Math.random()-0.5)*scale*1.2;
    pos[i*3+1] = y + (Math.random()-0.5)*scale*0.9;
    pos[i*3+2] = z + (Math.random()-0.5)*scale*0.9;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({
    color:0xffffcc, size:0.05, transparent:true, opacity:0.7,
    blending:THREE.AdditiveBlending, sizeAttenuation:true,
  }));
}

// Gold coin
function createCoin() {
  const group = new THREE.Group();
  const geo = new THREE.CylinderGeometry(0.06, 0.06, 0.012, 16);
  const mat = new THREE.MeshStandardMaterial({
    color:0xffd700, emissive:0xffa000, emissiveIntensity:0.2,
    roughness:0.2, metalness:0.8,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;

  // "€" emboss — just a slightly raised disc on each face
  const embossGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.002, 12);
  const embossMat = new THREE.MeshStandardMaterial({
    color:0xffec80, roughness:0.3, metalness:0.7,
  });
  const embossTop = new THREE.Mesh(embossGeo, embossMat);
  embossTop.position.y = 0.007;
  const embossBot = embossTop.clone();
  embossBot.position.y = -0.007;

  group.add(mesh, embossTop, embossBot);
  return group;
}

// Four-leaf clover
function createClover() {
  const group = new THREE.Group();
  const leafMat = new THREE.MeshStandardMaterial({
    color:0x2ecc71, emissive:0x1a8a4a, emissiveIntensity:0.15,
    roughness:0.6, metalness:0.05, side:THREE.DoubleSide,
  });

  for (let i = 0; i < 4; i++) {
    const leaf = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 8, 6),
      leafMat
    );
    const a = (i / 4) * Math.PI * 2;
    leaf.position.set(Math.cos(a)*0.035, 0, Math.sin(a)*0.035);
    leaf.scale.set(1, 0.3, 1.2);
    group.add(leaf);
  }

  // Stem
  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.004, 0.004, 0.08, 4),
    new THREE.MeshStandardMaterial({color:0x27ae60, roughness:0.7})
  );
  stem.position.y = -0.045;
  group.add(stem);

  return group;
}

// Star
function createStar() {
  const shape = new THREE.Shape();
  const spikes = 5, outerR = 1, innerR = 0.45;
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
    if (i === 0) shape.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    else shape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  shape.closePath();

  const geo = new THREE.ExtrudeGeometry(shape, {depth:0.15, bevelEnabled:true, bevelSize:0.05, bevelThickness:0.05});
  const mat = new THREE.MeshStandardMaterial({
    color:0xffd700, emissive:0xffaa00, emissiveIntensity:0.3,
    roughness:0.25, metalness:0.6,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  return mesh;
}

// Pot of gold
function createPotOfGold() {
  const group = new THREE.Group();

  // Pot body (half-sphere + cylinder)
  const potMat = new THREE.MeshStandardMaterial({
    color:0x2c2c2c, roughness:0.4, metalness:0.6
  });
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.07, 0.1, 16), potMat
  );
  body.position.y = 0.05;
  body.castShadow = true;
  group.add(body);

  // Rim
  const rim = new THREE.Mesh(
    new THREE.TorusGeometry(0.1, 0.012, 8, 16), potMat
  );
  rim.rotation.x = Math.PI / 2;
  rim.position.y = 0.1;
  group.add(rim);

  // Gold pile on top
  const goldMat = new THREE.MeshStandardMaterial({
    color:0xffd700, emissive:0xffa000, emissiveIntensity:0.15,
    roughness:0.2, metalness:0.8,
  });
  for (let i = 0; i < 6; i++) {
    const nugget = new THREE.Mesh(
      new THREE.SphereGeometry(0.02 + Math.random()*0.015, 6, 4),
      goldMat
    );
    nugget.position.set(
      (Math.random()-0.5)*0.08,
      0.1 + Math.random()*0.03,
      (Math.random()-0.5)*0.08
    );
    nugget.castShadow = true;
    group.add(nugget);
  }

  group.scale.set(1.2,1.2,1.2);
  return group;
}

// Lottery ticket
function createTicket() {
  const group = new THREE.Group();

  // Ticket body
  const ticketGeo = new THREE.BoxGeometry(0.18, 0.09, 0.003);
  const ticketMat = new THREE.MeshStandardMaterial({
    color:0xe94560, roughness:0.5, metalness:0.1,
  });
  const ticket = new THREE.Mesh(ticketGeo, ticketMat);
  ticket.castShadow = true;
  group.add(ticket);

  // Gold stripe
  const stripe = new THREE.Mesh(
    new THREE.BoxGeometry(0.18, 0.015, 0.004),
    new THREE.MeshStandardMaterial({
      color:0xffd700, roughness:0.2, metalness:0.7,
    })
  );
  stripe.position.y = 0.025;

// ================================================================
//  SPAWN ANIMATION
// ================================================================
function animateSpawn(obj, delay) {
  setTimeout(() => {
    const start = performance.now();
    (function step() {
      const t = Math.min((performance.now()-start)/900, 1);
      const c4 = (2*Math.PI)/3;
      const ease = t===0?0 : t===1?1 :
        Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
      obj.scale.set(ease, ease, ease);
      if (t < 1) requestAnimationFrame(step);
    })();
  }, delay);
}

// ================================================================
//  TAP TO COLLECT RAINBOW
// ================================================================
function onARTap(e) {
  if (scratchDone === false) return; // still in scratch phase
  if (rainbowsFound >= TOTAL_RAINBOWS) return;

  const touch = e.touches[0];
  const rect = e.target.getBoundingClientRect();
  const x = ((touch.clientX-rect.left)/rect.width)*2-1;
  const y =-((touch.clientY-rect.top)/rect.height)*2+1;

  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(x,y), arCamera);

  for (const rb of rainbows) {
    if (rb.userData.collected) continue;
    const meshes = [];
    rb.traverse(c=>{if(c.isMesh)meshes.push(c);});
    const hits = raycaster.intersectObjects(meshes, false);
    if (hits.length > 0 && hits[0].distance < 10) {
      collectRainbow(rb);
      break;
    }
  }
}

function collectRainbow(rb) {
  rb.userData.collected = true;
  rainbowsFound++;
  if (navigator.vibrate) navigator.vibrate(50);
  updateCounter();

  // Update B&W → color: each rainbow restores 1/TOTAL of color
  updateCameraColor();

  const start = performance.now();
  (function anim() {
    const t = Math.min((performance.now()-start)/600, 1);
    const s = 1+t*0.6;
    rb.scale.set(s,s,s);
    rb.traverse(c=>{
      if(c.material){c.material.transparent=true;c.material.opacity=Math.max(0,1-t);}
    });
    if(t<1) requestAnimationFrame(anim);
    else{
      rb.visible=false;
      if(rainbowsFound>=TOTAL_RAINBOWS) onAllCollected();
    }
  })();
}

function updateCameraColor() {
  // Grayscale goes from 100% (0 collected) to 0% (all collected)
  const pct = Math.max(0, 100 - (rainbowsFound / TOTAL_RAINBOWS) * 100);
  document.getElementById('camerafeed').style.filter = `grayscale(${pct}%)`;
}

function updateCounter() {
  document.getElementById('ar-counter').textContent =
    `🌈 ${rainbowsFound} / ${TOTAL_RAINBOWS}`;
}

function onAllCollected() {
  document.getElementById('ar-info').textContent = '🎉 Li hai trovati tutti!';

  // Phase 1: AR confetti celebration (3D particles in scene) — 6 seconds
  spawnARConfetti();

  // Phase 2: screen confetti overlay on top — starts at 4s
  setTimeout(launchScreenConfetti, 4000);

  // Phase 3: win screen after full celebration — 8 seconds total
  setTimeout(showWin, 8000);
}

// ================================================================
//  AR CONFETTI (3D particles in the Three.js scene)
// ================================================================
function spawnARConfetti() {
  if (!arScene) return;
  const colors = [0xff0000,0xff8800,0xffff00,0x00cc00,0x0088ff,0x8800ff,0xff00ff,0xffd700];

  // 100 confetti pieces falling from above, around the user
  for (let i = 0; i < 100; i++) {
    const geo = Math.random() > 0.5
      ? new THREE.BoxGeometry(0.04, 0.04, 0.005)
      : new THREE.CircleGeometry(0.025, 6);
    const mat = new THREE.MeshBasicMaterial({
      color: colors[Math.floor(Math.random()*colors.length)],
      side: THREE.DoubleSide,
    });
    const piece = new THREE.Mesh(geo, mat);

    const angle = Math.random() * Math.PI * 2;
    const dist = 0.5 + Math.random() * 3;
    piece.position.set(
      Math.sin(angle) * dist,
      3 + Math.random() * 3,  // start high
      -Math.cos(angle) * dist
    );
    piece.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);

    piece.userData = {
      type: 'ar-confetti',
      velY: -(0.5 + Math.random() * 1.0),     // fall speed
      rotSpeed: (Math.random()-0.5) * 5,        // tumble
      swayPhase: Math.random() * Math.PI * 2,
      swayAmp: 0.2 + Math.random() * 0.3,
    };

    arScene.add(piece);
    themeElements.push(piece);

    // Remove after 7 seconds
    setTimeout(() => {
      piece.visible = false;
      arScene.remove(piece);
    }, 7000);
  }

  // Also spawn big rainbow arcs above
  for (let i = 0; i < 3; i++) {
    const bigRainbow = createRainbow(3 + Math.random() * 2);
    const angle = (i / 3) * Math.PI * 2;
    bigRainbow.position.set(
      Math.sin(angle) * 2,
      3 + i * 0.5,
      -Math.cos(angle) * 2
    );
    bigRainbow.rotation.y = angle;
    bigRainbow.scale.set(0.01,0.01,0.01);
    arScene.add(bigRainbow);
    animateSpawn(bigRainbow, i * 500);

    setTimeout(() => {
      const start = performance.now();
      (function fade() {
        const t = Math.min((performance.now()-start)/1500, 1);
        bigRainbow.traverse(c=>{
          if(c.material){c.material.transparent=true;c.material.opacity=Math.max(0,1-t);}
        });
        if(t<1) requestAnimationFrame(fade);
        else { bigRainbow.visible=false; arScene.remove(bigRainbow); }
      })();
    }, 5000);
  }
}

// ================================================================
//  SCREEN CONFETTI (2D CSS overlay)
// ================================================================
function launchScreenConfetti() {
  const cols=['#ff0000','#ff8800','#ffff00','#00cc00','#0088ff','#8800ff','#ff00ff','#ffd700'];
  for(let i=0;i<120;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='confetti';
      p.style.left=Math.random()*100+'vw';
      p.style.background=cols[Math.floor(Math.random()*cols.length)];
      p.style.width=(6+Math.random()*10)+'px';
      p.style.height=(6+Math.random()*10)+'px';
      p.style.borderRadius=Math.random()>.5?'50%':'2px';
      p.style.animationDuration=(2+Math.random()*3)+'s';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),5500);
    },i*25);
  }
}

// ================================================================
//  WIN SCREEN
// ================================================================
function showWin() {
  document.getElementById('win-screen').classList.add('visible');
}

// ================================================================
//  BOOT — Start 8th Wall immediately
// ================================================================
function boot() {
  const onxrloaded = () => {
    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
      XRExtras.FullWindowCanvas.pipelineModule(),
      XRExtras.Loading.pipelineModule(),
      XRExtras.RuntimeError.pipelineModule(),
      gamePipelineModule(),
    ]);
    XR8.run({canvas: document.getElementById('camerafeed')});
  };

  if (window.XR8) onxrloaded();
  else window.addEventListener('xrloaded', onxrloaded);
}

// Start everything immediately — no splash, XR boots right away
// Camera permissions are handled by XRExtras.Loading
boot();
